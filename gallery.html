<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gallery — Gwikonge PEFA Church</title>
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/app.css">
</head>
<body>
<div id="siteHeader"></div>
<section class="page-header"><div id="backBtn" style="text-align:left;padding:.3rem 0 0 0;"></div><h1>Gallery</h1><p>Photos and videos from our church life.</p></section>
<section class="section container">
  <div id="galleryGrid" class="grid grid-3"><p>Loading…</p></div>
</section>
<div id="siteFooter"></div>
<script src="js/api.js"></script>
<script src="js/partials.js"></script>
<script>
(async () => {
  const wrap = document.getElementById('galleryGrid');
  try {
    const { data } = await Api.gallery.list('?limit=60');
    wrap.innerHTML = data.length ? data.map(g => `
      <div class="card">
        ${g.type === 'video'
          ? `<video src="${g.url}" controls style="width:100%;height:170px;object-fit:cover;background:#000;"></video>`
          : `<img src="${g.url}" alt="${g.title || 'Gallery photo'}">`}
        <div class="card-body"><h3>${g.title || ''}</h3><p class="card-meta">${g.album || ''}</p></div>
      </div>`).join('') : '<p>No gallery items yet.</p>';
  } catch (e) { wrap.innerHTML = '<p>Could not load gallery.</p>'; }
})();
</script>
</body>
</html>
